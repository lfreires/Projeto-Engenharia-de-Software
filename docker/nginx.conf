server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the React SPA — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → backend container (query-service)
    # In Docker Compose the backend is reachable as http://backend:8000
    # In Azure Container Apps the backend URL is injected via BACKEND_URL env var
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
