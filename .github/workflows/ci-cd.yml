name: CI/CD — Production

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: query-service
  FRONTEND_IMAGE: query-frontend

jobs:
  # ── 1. Backend tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend — lint + typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: query-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports

      - name: Run tests + coverage
        env:
          GROQ_API_KEY: "test-key"
          AZURE_SEARCH_KEY: "test-key"
          AZURE_SEARCH_ENDPOINT: "https://mock.search.windows.net"
          BEARER_TOKEN: "dev-token"
        run: pytest

  # ── 2. Build & deploy ─────────────────────────────────────────────────────────
  build-deploy:
    name: Build images → push ACR → deploy production
    needs: test-backend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Build backend
      - name: Build backend image via ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --image ${{ env.BACKEND_IMAGE }}:latest \
            ./query-service

      # Build frontend (passes project id and bearer token as build args)
      - name: Build frontend image via ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --image ${{ env.FRONTEND_IMAGE }}:latest \
            --build-arg VITE_PROJECT_ID=${{ secrets.VITE_PROJECT_ID }} \
            --build-arg VITE_BEARER_TOKEN=${{ secrets.VITE_BEARER_TOKEN }} \
            .

      # Deploy backend Container App
      - name: Deploy backend to Container App
        run: |
          az containerapp update \
            --name ${{ secrets.BACKEND_APP_NAME }} \
            --resource-group ${{ secrets.RG_NAME }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      # Deploy frontend Container App
      - name: Deploy frontend to Container App
        run: |
          az containerapp update \
            --name ${{ secrets.FRONTEND_APP_NAME }} \
            --resource-group ${{ secrets.RG_NAME }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      # Smoke test — health check on prod backend
      - name: Smoke test — backend health
        run: |
          URL=$(az containerapp show \
            --name ${{ secrets.BACKEND_APP_NAME }} \
            --resource-group ${{ secrets.RG_NAME }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          curl -f https://$URL/api/v1/query/health
